<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dicky News | Premium Link Unlocker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --glass: rgba(255, 255, 255, 0.7); 
            --bg: #f2f2f7; 
            --text: #1c1c1e; 
            --yellow: #ffcc00; 
            --card-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overflow-x: hidden; }
        
        /* Background Efek */
        #bg-light { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: linear-gradient(135deg, #e1e1e6 0%, #ffffff 100%); }
        
        .container { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        
        .glass-card { 
            background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.3); border-radius: 40px; padding: 40px;
            width: 100%; max-width: 400px; text-align: center;
            box-shadow: var(--card-shadow);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .glass-card:hover { transform: scale(1.01); }
        
        h2 { font-size: 20px; letter-spacing: 1px; color: var(--text); margin-bottom: 5px; }
        .sub-text { font-size: 12px; color: #8e8e93; margin-bottom: 20px; }
        
        .task-item { 
            background: rgba(0,0,0,0.03); border: none; color: var(--text);
            padding: 18px; margin: 12px 0; border-radius: 20px; display: flex; align-items: center;
            cursor: pointer; transition: all 0.3s; width: 100%; font-weight: 600;
        }
        .task-item:hover { background: rgba(0,0,0,0.08); transform: scale(1.02); }
        .task-item.is-done { background: var(--yellow); color: #000; }
        .task-item.is-error { border: 2px solid var(--yellow); animation: shake 0.3s; }
        
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        
        .btn-main { background: var(--text); color: #fff; border: none; padding: 18px; width: 100%; border-radius: 20px; font-weight: bold; cursor: pointer; margin-top: 15px; transition: 0.3s; }
        .btn-main:active { transform: scale(0.97); }
    </style>
</head>
<body>

<div id="bg-light"></div>
<div class="container">
    <div class="glass-card" id="app"></div>
</div>

<script>
    const mySocials = [
        { n: "Subscribe YT Utama", i: "fab fa-youtube", l: "https://youtube.com/@dickynews" },
        { n: "Subscribe YT Kedua", i: "fab fa-youtube", l: "https://www.youtube.com/@GODickyNews" },
        { n: "Follow Instagram", i: "fab fa-instagram", l: "https://www.instagram.com/dickynews" },
        { n: "Follow TikTok", i: "fab fa-tiktok", l: "https://www.tiktok.com/@dickynewsyt" },
        { n: "Follow Facebook", i: "fab fa-facebook", l: "https://www.facebook.com/dickynews45" }
    ];

    const params = new URLSearchParams(window.location.search);
    const app = document.getElementById("app");

    function renderUI() {
        if(!params.get("v")) {
            // --- HALAMAN GENERATOR ---
            app.innerHTML = `
                <h2>LINK GENERATOR</h2>
                <p class="sub-text">Bikin link proteksi ala Dicky News</p>
                <input id="link" style="width:100%; padding:15px; background:rgba(0,0,0,0.05); border:none; border-radius:15px; margin:10px 0;" placeholder="Paste URL Tujuan..."> 
                <button class="btn-main" onclick="generate()">Generate Link</button>
                <div id="res"></div>
            `;
        } else {
            // --- HALAMAN VERIFIKASI ---
            app.innerHTML = `<h2>VERIFIKASI</h2><p class="sub-text">Selesaikan misi untuk akses</p><div id="tasks"></div>`;
            mySocials.forEach((s, idx) => {
                let b = document.createElement("button");
                b.className = "task-item";
                b.innerHTML = `<i class="${s.i}" style="margin-right:12px"></i> ${s.n}`;
                b.onclick = () => {
                    if(b.classList.contains('is-done')) return;
                    window.open(s.l, "_blank");
                    b.disabled = true;
                    let count = 5;
                    let timer = setInterval(() => {
                        b.innerHTML = `Mengecek... ${count}s`;
                        if(--count < 0) {
                            clearInterval(timer);
                            if(!b.dataset.fail) {
                                b.dataset.fail = "true";
                                b.classList.add("is-error");
                                b.innerHTML = `Gagal! KLIK ULANG untuk ${s.n}`;
                                b.disabled = false;
                            } else {
                                b.classList.remove("is-error");
                                b.classList.add("is-done");
                                b.innerHTML = `<i class="fas fa-check"></i> BERHASIL`;
                            }
                        }
                    }, 1000);
                };
                document.getElementById("tasks").appendChild(b);
            });
        }
    }

    window.generate = () => { 
        let url = document.getElementById('link').value;
        document.getElementById('res').innerHTML = `<p style="font-size:11px; margin-top:15px; word-break:break-all; color:#555;">Link Copy: <br>${window.location.origin + window.location.pathname}?v=${btoa(url)}</p>`;
    };
    
    renderUI();
</script>
</body>
</html>
